
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoCatastro Consulta</title>
    <style>
        body {
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            background-color: hsl(220, 14%, 96%);
            color: hsl(224, 71%, 4%);
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
        }
        main {
            width: 100%;
            max-width: 672px;
        }
        header {
            text-align: center;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: hsl(221, 60%, 40%);
        }
        header p {
            color: hsl(220, 9%, 46%);
            font-size: 1.125rem;
            margin-top: 0.5rem;
        }
        form {
            display: flex;
            gap: 0.5rem;
        }
        input {
            flex-grow: 1;
            padding: 0.5rem 0.75rem;
            font-size: 1rem;
            border: 1px solid hsl(220, 13%, 86%);
            border-radius: 0.5rem;
            background-color: hsl(220, 14%, 96%);
        }
        input:focus {
            outline: 2px solid hsl(221, 60%, 40%);
            outline-offset: 2px;
        }
        button {
            padding: 0.5rem 1rem;
            background-color: hsl(221, 60%, 40%);
            color: hsl(210, 20%, 98%);
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #results-container {
            margin-top: 2rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .card {
            background-color: white;
            border: 1px solid hsl(220, 13%, 86%);
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0,0,0,0.1);
        }
        .card-header {
            padding: 1.5rem 1.5rem 0 1.5rem;
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-title svg {
            width: 20px;
            height: 20px;
            color: hsl(221, 60%, 40%);
        }
        .card-content {
            padding: 1.5rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        .info-item {
            display: flex;
            gap: 0.75rem;
        }
        .info-item .icon {
             width: 20px;
             height: 20px;
             margin-top: 2px;
             color: hsl(220, 9%, 46%);
        }
        .info-item .text .label {
            font-size: 0.875rem;
            color: hsl(220, 9%, 46%);
        }
        .info-item .text .value {
            font-size: 1rem;
            color: hsl(224, 71%, 4%);
        }
        .geo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            text-align: center;
        }
        .geo-item {
            background-color: hsla(220, 13%, 91%, 0.5);
            padding: 1rem;
            border-radius: 0.5rem;
        }
        .geo-item svg { margin: 0 auto 0.25rem; width: 24px; height: 24px; color: hsl(220, 9%, 46%); }
        .climate-zone { display:flex; align-items:center; gap: 1rem; }
        .climate-badge {
            flex-shrink: 0;
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            background-color: hsla(221, 60%, 40%, 0.1);
            color: hsl(221, 60%, 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.25rem;
            font-weight: 700;
        }
        .alert {
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
        }
        .alert-error {
            color: #721c24;
            background-color: #f8d7da;
            border-color: #f5c6cb;
        }
        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            flex-direction: column;
            gap: 1rem;
            color: hsl(220, 9%, 46%);
            border: 2px dashed hsl(220, 13%, 86%);
            border-radius: 0.5rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid hsl(220, 13%, 86%);
            border-top-color: hsl(221, 60%, 40%);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <main>
        <header>
            <h1>GeoCatastro España</h1>
            <p>Introduce una referencia catastral para obtener su información geográfica.</p>
        </header>

        <form id="search-form">
            <input name="ref" placeholder="Introduce la referencia catastral" required minlength="14" maxlength="20" autocomplete="off" />
            <button type="submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Buscar
            </button>
        </form>

        <div id="status-container" class="mt-8"></div>

    </main>

    <script>
        const form = document.getElementById('search-form');
        const statusContainer = document.getElementById('status-container');

        // --- DATA AND LOGIC FROM provinces.ts ---
        const provinceIneCodes = new Map([
            ['ALAVA', '01'], ['ARABA', '01'],
            ['ALBACETE', '02'],
            ['ALICANTE', '03'], ['ALACANT', '03'],
            ['ALMERIA', '04'],
            ['AVILA', '05'],
            ['BADAJOZ', '06'],
            ['ISLAS BALEARES', '07'], ['ILLES BALEARS', '07'], ['BALEARS, ILLES', '07'],
            ['BARCELONA', '08'],
            ['BURGOS', '09'],
            ['CACERES', '10'],
            ['CADIZ', '11'],
            ['CASTELLON', '12'], ['CASTELLO', '12'],
            ['CIUDAD REAL', '13'],
            ['CORDOBA', '14'],
            ['LA CORUNA', '15'], ['A CORUNA', '15'], ['CORUNA, A', '15'],
            ['CUENCA', '16'],
            ['GERONA', '17'], ['GIRONA', '17'],
            ['GRANADA', '18'],
            ['GUADALAJARA', '19'],
            ['GUIPUZCOA', '20'], ['GIPUZKOA', '20'],
            ['HUELVA', '21'],
            ['HUESCA', '22'],
            ['JAEN', '23'],
            ['LEON', '24'],
            ['LERIDA', '25'], ['LLEIDA', '25'],
            ['LA RIOJA', '26'], ['RIOJA, LA', '26'],
            ['LUGO', '27'],
            ['MADRID', '28'],
            ['MALAGA', '29'],
            ['MURCIA', '30'],
            ['NAVARRA', '31'],
            ['ORENSE', '32'], ['OURENSE', '32'],
            ['ASTURIAS', '33'],
            ['PALENCIA', '34'],
            ['LAS PALMAS', '35'], ['PALMAS, LAS', '35'],
            ['PONTEVEDRA', '36'],
            ['SALAMANCA', '37'],
            ['SANTA CRUZ DE TENERIFE', '38'], ['S.C. TENERIFE', '38'],
            ['CANTABRIA', '39'],
            ['SEGOVIA', '40'],
            ['SEVILLA', '41'],
            ['SORIA', '42'],
            ['TARRAGONA', '43'],
            ['TERUEL', '44'],
            ['TOLEDO', '45'],
            ['VALENCIA', '46'], ['VALÈNCIA', '46'],
            ['VALLADOLID', '47'],
            ['VIZCAYA', '48'], ['BIZKAIA', '48'],
            ['ZAMORA', '49'],
            ['ZARAGOZA', '50'],
            ['CEUTA', '51'],
            ['MELILLA', '52'],
        ]);

        function getIneCode(provinceName) {
            if (!provinceName) return null;
            const normalized = provinceName.toUpperCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g, '');
            return provinceIneCodes.get(normalized) || null;
        }

        const climaticZones = new Map([
            ['ALBACETE', [{max: 450, zone: 'C3'}, {max: 950, zone: 'D3'}, {min: 951, zone: 'E1'}]],
            ['ALICANTE', [{max: 250, zone: 'B4'}, {max: 700, zone: 'C3'}, {min: 701, zone: 'D3'}]],
            ['ALMERIA', [{max: 100, zone: 'A4'}, {max: 250, zone: 'B4'}, {max: 400, zone: 'B3'}, {max: 800, zone: 'C3'}, {min: 801, zone: 'D3'}]],
            ['ALAVA', [{max: 600, zone: 'D1'}, {min: 601, zone: 'E1'}]],
            ['ASTURIAS', [{max: 50, zone: 'C1'}, {max: 550, zone: 'D1'}, {min: 551, zone: 'E1'}]],
            ['AVILA', [{max: 550, zone: 'D2'}, {max: 850, zone: 'D1'}, {min: 851, zone: 'E1'}]],
            ['BADAJOZ', [{max: 400, zone: 'C4'}, {max: 450, zone: 'C3'}, {min: 451, zone: 'D3'}]],
            ['ISLAS BALEARES', [{max: 250, zone: 'B3'}, {min: 251, zone: 'C3'}]],
            ['BARCELONA', [{max: 250, zone: 'C2'}, {max: 450, zone: 'D2'}, {max: 750, zone: 'D1'}, {min: 751, zone: 'E1'}]],
            ['VIZCAYA', [{max: 250, zone: 'C1'}, {min: 251, zone: 'D1'}]],
            ['BURGOS', [{max: 600, zone: 'D1'}, {min: 601, zone: 'E1'}]],
            ['CACERES', [{max: 600, zone: 'C4'}, {max: 1050, zone: 'D3'}, {min: 1051, zone: 'E1'}]],
            ['CADIZ', [{max: 150, zone: 'A3'}, {max: 450, zone: 'B3'}, {max: 600, zone: 'C3'}, {max: 850, zone: 'C2'}, {min: 851, zone: 'D2'}]],
            ['CANTABRIA', [{max: 150, zone: 'C1'}, {max: 650, zone: 'D1'}, {min: 651, zone: 'E1'}]],
            ['CASTELLON', [{max: 100, zone: 'B3'}, {max: 500, zone: 'C3'}, {max: 600, zone: 'D3'}, {max: 1000, zone: 'D2'}, {min: 1001, zone: 'E1'}]],
            ['CEUTA', [{zone: 'B3'}]],
            ['CIUDAD REAL', [{max: 450, zone: 'C4'}, {max: 500, zone: 'C3'}, {min: 501, zone: 'D3'}]],
            ['CORDOBA', [{max: 150, zone: 'B4'}, {max: 550, zone: 'C4'}, {min: 551, zone: 'D3'}]],
            ['LA CORUNA', [{max: 200, zone: 'C1'}, {min: 201, zone: 'D1'}]],
            ['CUENCA', [{max: 800, zone: 'D3'}, {max: 1050, zone: 'D2'}, {min: 1051, zone: 'E1'}]],
            ['GUIPUZCOA', [{max: 400, zone: 'D1'}, {min: 401, zone: 'E1'}]],
            ['GERONA', [{max: 100, zone: 'C2'}, {max: 600, zone: 'D2'}, {min: 601, zone: 'E1'}]],
            ['GRANADA', [{max: 50, zone: 'A4'}, {max: 350, zone: 'B4'}, {max: 600, zone: 'C4'}, {max: 800, zone: 'C3'}, {max: 1300, zone: 'D3'}, {min: 1301, zone: 'E1'}]],
            ['GUADALAJARA', [{max: 950, zone: 'D3'}, {max: 1000, zone: 'D2'}, {min: 1001, zone: 'E1'}]],
            ['HUELVA', [{max: 50, zone: 'A4'}, {max: 150, zone: 'B4'}, {max: 350, zone: 'B3'}, {max: 800, zone: 'C3'}, {min: 801, zone: 'D3'}]],
            ['HUESCA', [{max: 200, zone: 'C3'}, {max: 400, zone: 'D3'}, {max: 700, zone: 'D2'}, {min: 701, zone: 'E1'}]],
            ['JAEN', [{max: 350, zone: 'B4'}, {max: 750, zone: 'C4'}, {max: 1250, zone: 'D3'}, {min: 1251, zone: 'E1'}]],
            ['LEON', [{zone: 'E1'}]],
            ['LERIDA', [{max: 100, zone: 'C3'}, {max: 600, zone: 'D3'}, {min: 601, zone: 'E1'}]],
            ['LUGO', [{max: 500, zone: 'D1'}, {min: 501, zone: 'E1'}]],
            ['MADRID', [{max: 500, zone: 'C3'}, {max: 950, zone: 'D3'}, {max: 1000, zone: 'D2'}, {min: 1001, zone: 'E1'}]],
            ['MALAGA', [{max: 100, zone: 'A3'}, {max: 300, zone: 'B3'}, {max: 700, zone: 'C3'}, {min: 701, zone: 'D3'}]],
            ['MELILLA', [{zone: 'A3'}]],
            ['MURCIA', [{max: 100, zone: 'B3'}, {max: 550, zone: 'C3'}, {min: 551, zone: 'D3'}]],
            ['NAVARRA', [{max: 100, zone: 'C2'}, {max: 350, zone: 'D2'}, {max: 600, zone: 'D1'}, {min: 601, zone: 'E1'}]],
            ['ORENSE', [{max: 150, zone: 'C3'}, {max: 300, zone: 'C2'}, {max: 800, zone: 'D2'}, {min: 801, zone: 'E1'}]],
            ['PALENCIA', [{max: 800, zone: 'D1'}, {min: 801, zone: 'E1'}]],
            ['LAS PALMAS', [{max: 350, zone: 'α3'}, {max: 750, zone: 'A2'}, {max: 1000, zone: 'B2'}, {min: 1001, zone: 'C2'}]],
            ['PONTEVEDRA', [{max: 350, zone: 'C1'}, {min: 351, zone: 'D1'}]],
            ['LA RIOJA', [{max: 200, zone: 'C2'}, {max: 700, zone: 'D2'}, {min: 701, zone: 'E1'}]],
            ['SALAMANCA', [{max: 850, zone: 'D2'}, {min: 851, zone: 'E1'}]],
            ['SANTA CRUZ DE TENERIFE', [{max: 350, zone: 'α3'}, {max: 750, zone: 'A2'}, {max: 1000, zone: 'B2'}, {min: 1001, zone: 'C2'}]],
            ['SEGOVIA', [{max: 1050, zone: 'D2'}, {min: 1051, zone: 'E1'}]],
            ['SEVILLA', [{max: 200, zone: 'B4'}, {min: 201, zone: 'C4'}]],
            ['SORIA', [{max: 750, zone: 'D2'}, {max: 800, zone: 'D1'}, {min: 801, zone: 'E1'}]],
            ['TARRAGONA', [{max: 100, zone: 'B3'}, {max: 500, zone: 'C3'}, {min: 501, zone: 'D3'}]],
            ['TERUEL', [{max: 450, zone: 'C3'}, {max: 500, zone: 'C2'}, {max: 1000, zone: 'D2'}, {min: 1001, zone: 'E1'}]],
            ['TOLEDO', [{max: 500, zone: 'C4'}, {min: 501, zone: 'D3'}]],
            ['VALENCIA', [{max: 50, zone: 'B3'}, {max: 500, zone: 'C3'}, {max: 950, zone: 'D2'}, {min: 951, zone: 'E1'}]],
            ['VALLADOLID', [{max: 800, zone: 'D2'}, {min: 801, zone: 'E1'}]],
            ['ZAMORA', [{max: 800, zone: 'D2'}, {min: 801, zone: 'E1'}]],
            ['ZARAGOZA', [{max: 200, zone: 'C3'}, {max: 650, zone: 'D3'}, {min: 651, zone: 'E1'}]],
        ]);
        const climateProvinceMap = new Map([
            ['ARABA', 'ALAVA'],
            ['ALACANT', 'ALICANTE'],
            ['ILLES BALEARS', 'ISLAS BALEARES'], ['BALEARS, ILLES', 'ISLAS BALEARES'],
            ['BIZKAIA', 'VIZCAYA'],
            ['CASTELLO', 'CASTELLON'],
            ['A CORUNA', 'LA CORUNA'], ['CORUNA, A', 'LA CORUNA'],
            ['GIPUZKOA', 'GUIPUZCOA'],
            ['GIRONA', 'GERONA'],
            ['LLEIDA', 'LERIDA'],
            ['RIOJA, LA', 'LA RIOJA'],
            ['OURENSE', 'ORENSE'],
            ['PALMAS, LAS', 'LAS PALMAS'],
            ['S.C. TENERIFE', 'SANTA CRUZ DE TENERIFE'],
            ['VALÈNCIA', 'VALENCIA'],
        ]);

        function getClimaticZone(provinceName, altitude) {
            if (!provinceName) return null;
            let normalized = provinceName.toUpperCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g, '');
            normalized = climateProvinceMap.get(normalized) || normalized;

            const rules = climaticZones.get(normalized);
            if (!rules) return null;

            for (let i = 0; i < rules.length; i++) {
                const rule = rules[i];
                if (rule.max === undefined && rule.min === undefined) {
                    return { zone: rule.zone, rule: 'Provincia con zona única' };
                }
                if (rule.max !== undefined && altitude <= rule.max) {
                    const lowerBound = i > 0 ? (rules[i - 1].max || 0) : 0;
                    if (lowerBound > 0) {
                        return { zone: rule.zone, rule: `${lowerBound}m < Altitud <= ${rule.max}m` };
                    } else {
                        return { zone: rule.zone, rule: `Altitud <= ${rule.max}m` };
                    }
                }
                if (rule.min !== undefined && rule.max === undefined && altitude >= rule.min) {
                    return { zone: rule.zone, rule: `Altitud >= ${rule.min}m` };
                }
            }
            return null;
        }


        // --- LOGIC FROM actions.ts ---
        const CATASTRO_COORDS_URL = 'https://ovc.catastro.meh.es/ovcservweb/OVCSWLocalizacionRC/OVCCoordenadas.asmx/Consulta_CPMRC';
        const CATASTRO_DATA_URL = 'https://ovc.catastro.meh.es/ovcservweb/OVCSWLocalizacionRC/OVCCallejero.asmx/Consulta_DNPRC';
        const ELEVATION_API_URL = 'https://api.open-meteo.com/v1/elevation';

        const parseXmlTag = (xmlText, tag) => {
            const regex = new RegExp(`<${tag}>(.*?)</${tag}>`);
            const match = xmlText.match(regex);
            return (match && match[1]) ? match[1].replace(/&lt;/g, '<').replace(/&gt;/, '>').replace(/&amp;/, '&') : null;
        };
        
        const getErrorDescription = (xmlText) => {
            const errorMatch = xmlText.match(/<des>(.*?)<\\/des>/);
            return errorMatch ? errorMatch[1] : "Error desconocido al procesar la respuesta del Catastro.";
        };


        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const ref = formData.get('ref').trim();
            const button = form.querySelector('button');

            if (ref.length < 14) {
                showError("La referencia catastral es demasiado corta.");
                return;
            }

            setLoading();
            button.disabled = true;

            try {
                // Fetch calls
                const coordsUrl = `${CATASTRO_COORDS_URL}?Provincia=&Municipio=&SRS=EPSG:4326&RC=${ref.substring(0, 14)}`;
                const dataUrl = `${CATASTRO_DATA_URL}?Provincia=&Municipio=&RC=${ref}`;
                
                const [coordsResponse, dataResponse] = await Promise.all([
                    fetch(coordsUrl),
                    fetch(dataUrl)
                ]);

                if (!coordsResponse.ok || !dataResponse.ok) {
                    throw new Error("No se pudo contactar con los servicios del Catastro. Inténtelo más tarde.");
                }

                const [coordsXml, dataXml] = await Promise.all([
                    coordsResponse.text(),
                    dataResponse.text(),
                ]);

                if (coordsXml.includes('<err>')) {
                    throw new Error(`Error del Catastro (coordenadas): ${getErrorDescription(coordsXml)}`);
                }
                if (dataXml.includes('<err>')) {
                    throw new Error(`Error del Catastro (dirección): ${getErrorDescription(dataXml)}`);
                }

                const longitudeStr = parseXmlTag(coordsXml, 'xcen');
                const latitudeStr = parseXmlTag(coordsXml, 'ycen');
                
                const address = parseXmlTag(dataXml, 'ldt');
                const municipality = parseXmlTag(dataXml, 'nm');
                const province = parseXmlTag(dataXml, 'np');
                const postalCode = parseXmlTag(dataXml, 'dp');
                const constructionYear = parseXmlTag(dataXml, 'ant');

                if (!address || !longitudeStr || !latitudeStr) {
                    throw new Error("No se encontraron datos completos para la referencia catastral proporcionada.");
                }

                const latitude = parseFloat(latitudeStr);
                const longitude = parseFloat(longitudeStr);

                const elevationResponse = await fetch(`${ELEVATION_API_URL}?latitude=${latitude}&longitude=${longitude}`);
                const elevationData = elevationResponse.ok ? await elevationResponse.json() : { elevation: [0] };
                const altitude = elevationData.elevation?.[0] ?? 0;

                const ineCode = province ? getIneCode(province) : null;
                const climaticZoneInfo = province ? getClimaticZone(province, altitude) : null;
                
                const result = {
                    address,
                    municipality,
                    province,
                    postalCode,
                    constructionYear,
                    ineCode,
                    latitude,
                    longitude,
                    altitude,
                    climaticZone: climaticZoneInfo?.zone,
                    climaticZoneRule: climaticZoneInfo?.rule,
                };
                
                showResults(result);

            } catch (error) {
                showError(error.message);
            } finally {
                button.disabled = false;
            }
        });

        // --- UI RENDERING ---
        function setLoading() {
            statusContainer.innerHTML = `
                <div class="loader">
                    <div class="spinner"></div>
                    <p>Buscando datos...</p>
                </div>
            `;
        }

        function showError(message) {
            statusContainer.innerHTML = `<div class="alert alert-error">${message}</div>`;
        }
        
        function showResults(data) {
            const { address, municipality, province, postalCode, constructionYear, ineCode, latitude, longitude, altitude, climaticZone, climaticZoneRule } = data;
            
            const catastroItems = [
                { icon: 'map-pin', label: "Dirección", value: address },
                { icon: 'home', label: "Municipio", value: municipality },
                { icon: 'building', label: "Provincia", value: province ? `${province} (INE: ${ineCode || 'N/A'})` : null },
                { icon: 'map-pin', label: "Código Postal", value: postalCode },
                { icon: 'calendar', label: "Año Construcción", value: constructionYear },
            ];

            const geoItems = [
                { icon: 'globe', label: "Latitud", value: latitude.toFixed(6) },
                { icon: 'globe', label: "Longitud", value: longitude.toFixed(6) },
                { icon: 'mountain', label: "Altitud", value: `${altitude.toFixed(2)} m` },
            ];
            
            statusContainer.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-5/2"/><path d="M12 9V2L7 4.5V12h10V4.5L12 2z"/><path d="M12 12H2l5-2.5V2l5 2.5V9z"/><path d="M12 12h10l-5-2.5V2l-5 2.5V9z"/></svg>
                            Datos del Catastro
                        </h2>
                    </div>
                    <div class="card-content info-grid">
                        ${catastroItems.map(item => item.value ? `
                            <div class="info-item">
                                ${getIcon(item.icon)}
                                <div class="text">
                                    <div class="label">${item.label}</div>
                                    <div class="value">${item.value}</div>
                                </div>
                            </div>
                        ` : '').join('')}
                    </div>
                </div>

                ${climaticZone ? `
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">
                           ${getIcon('thermometer')}
                           <span>Zona Climática (DB-HE)</span>
                        </h2>
                    </div>
                    <div class="card-content">
                       <div class="climate-zone">
                            <div class="climate-badge">${climaticZone}</div>
                            <div>
                                <p>La zona climática según el CTE DB-HE es <strong>${climaticZone}</strong>.</p>
                                ${climaticZoneRule ? `<p style="font-size:0.875rem; color: #555;">Regla: ${climaticZoneRule} a ${altitude.toFixed(0)}m de altitud.</p>` : ''}
                            </div>
                       </div>
                    </div>
                </div>
                ` : ''}

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">
                            ${getIcon('globe')}
                            <span>Datos Geográficos</span>
                        </h2>
                    </div>
                    <div class="card-content geo-grid">
                         ${geoItems.map(item => `
                            <div class="geo-item">
                                ${getIcon(item.icon)}
                                <div class="label">${item.label}</div>
                                <div class="value" style="font-weight:600;">${item.value}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <p style="text-align:center; font-size: 0.8rem; color: #666; margin-top: 1rem;">La funcionalidad de IA no está disponible en esta versión local.</p>
            `;
        }

        function getIcon(name) {
            const icons = {
                'map-pin': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>',
                'home': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>',
                'building': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>',
                'calendar': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>',
                'globe': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>',
                'mountain': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"></path></svg>',
                'thermometer': '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0z"></path></svg>'
            };
            return icons[name] || '';
        }
    </script>
</body>
</html>
